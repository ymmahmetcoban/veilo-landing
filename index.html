<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veilo — Evinizin Dijital Kalkanı</title>
<meta name="description" content="Veilo, Türk aileler için DNS tabanlı ebeveyn kontrol platformu. Çocuklarınızı zararlı içeriklerden koruyun.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1a7a6e;
    --teal-dark: #0d3d38;
    --teal-light: #2aa89a;
    --teal-mist: #e8f5f2;
    --cream: #faf8f5;
    --ink: #12100e;
    --ink-light: #4a4744;
    --ink-muted: #8a8580;
    --warm-white: #fffdfb;
    --accent-coral: #e8735a;
    --accent-gold: #d4a843;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    color: var(--ink);
    background: var(--cream);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, .display { font-family: 'Playfair Display', serif; }

  /* ─── NOISE TEXTURE ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 1.25rem 2rem;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  nav.scrolled {
    background: rgba(250, 248, 245, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 1px 0 rgba(18,16,14,0.06);
    padding: 0.75rem 2rem;
  }
  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    text-decoration: none;
  }
  .logo-mark {
    width: 38px;
    height: 38px;
    background: var(--teal);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .logo-mark::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    border-radius: inherit;
  }
  .logo-mark span {
    color: white;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.15rem;
    position: relative;
    z-index: 1;
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.35rem;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .nav-links a {
    text-decoration: none;
    color: var(--ink-light);
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.2s;
    letter-spacing: 0.01em;
  }
  .nav-links a:hover { color: var(--teal); }
  .nav-cta {
    background: var(--teal) !important;
    color: white !important;
    padding: 0.6rem 1.5rem;
    border-radius: 100px;
    font-weight: 600 !important;
    transition: all 0.3s !important;
  }
  .nav-cta:hover {
    background: var(--teal-dark) !important;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(26,122,110,0.3);
  }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    padding: 8rem 2rem 6rem;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    top: -20%;
    right: -10%;
    width: 70vw;
    height: 70vw;
    max-width: 900px;
    max-height: 900px;
    background: radial-gradient(circle, rgba(26,122,110,0.06) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .hero-bg-2 {
    position: absolute;
    bottom: -15%;
    left: -15%;
    width: 50vw;
    height: 50vw;
    max-width: 600px;
    max-height: 600px;
    background: radial-gradient(circle, rgba(232,115,90,0.04) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    position: relative;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 1rem 0.4rem 0.5rem;
    background: var(--teal-mist);
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--teal);
    margin-bottom: 1.75rem;
    animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .hero-badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--teal-light);
    animation: pulse 2s infinite;
  }
  .hero h1 {
    font-size: clamp(2.8rem, 5.5vw, 4.2rem);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 1.5rem;
    animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }
  .hero h1 .teal-word { color: var(--teal); }
  .hero-desc {
    font-size: 1.15rem;
    line-height: 1.7;
    color: var(--ink-muted);
    max-width: 480px;
    margin-bottom: 2.5rem;
    animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }
  .hero-actions {
    display: flex;
    gap: 1rem;
    align-items: center;
    animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem 2rem;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .btn-primary:hover {
    background: var(--teal-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(26,122,110,0.3);
  }
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem 1.75rem;
    background: transparent;
    color: var(--ink);
    border: 1.5px solid rgba(18,16,14,0.15);
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 500;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
  }
  .btn-secondary:hover {
    border-color: var(--teal);
    color: var(--teal);
    background: var(--teal-mist);
  }

  /* Hero visual */
  .hero-visual {
    position: relative;
    animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
  }
  .hero-mockup {
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow:
      0 1px 2px rgba(0,0,0,0.04),
      0 4px 16px rgba(0,0,0,0.04),
      0 24px 60px rgba(0,0,0,0.06);
    position: relative;
  }
  .mockup-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .mockup-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .mockup-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .mock-stat {
    padding: 1.25rem;
    border-radius: 16px;
    background: var(--cream);
  }
  .mock-stat-label {
    font-size: 0.75rem;
    color: var(--ink-muted);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }
  .mock-stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--ink);
  }
  .mock-stat-sub {
    font-size: 0.7rem;
    color: var(--teal);
    font-weight: 600;
    margin-top: 0.25rem;
  }
  .mock-blocked {
    margin-top: 1rem;
    padding: 1rem 1.25rem;
    background: #fef2f2;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .mock-blocked-icon {
    width: 36px;
    height: 36px;
    background: #fee2e2;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .mock-blocked-text { font-size: 0.8rem; color: #b91c1c; font-weight: 500; }
  .mock-blocked-time { font-size: 0.7rem; color: #dc2626; opacity: 0.6; }

  /* Floating badge on mockup */
  .float-badge {
    position: absolute;
    background: white;
    border-radius: 14px;
    padding: 0.75rem 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    animation: float 6s ease-in-out infinite;
  }
  .float-badge.top-right {
    top: -1rem;
    right: -1.5rem;
    animation-delay: 0s;
  }
  .float-badge.bottom-left {
    bottom: 1rem;
    left: -2rem;
    animation-delay: 3s;
  }
  .float-badge .fb-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
  }
  .float-badge .fb-text {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--ink);
  }
  .float-badge .fb-sub {
    font-size: 0.65rem;
    color: var(--ink-muted);
  }

  /* ─── TRUST BAR ─── */
  .trust-bar {
    padding: 3rem 2rem;
    text-align: center;
    border-top: 1px solid rgba(0,0,0,0.04);
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .trust-items {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    gap: 3.5rem;
    flex-wrap: wrap;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.9rem;
    color: var(--ink-muted);
    font-weight: 500;
  }
  .trust-item .ti-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--teal-mist);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  /* ─── PROBLEM SECTION ─── */
  .problem {
    padding: 7rem 2rem;
    position: relative;
  }
  .problem-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
  }
  .problem-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-coral);
    margin-bottom: 1.25rem;
  }
  .problem h2 {
    font-size: clamp(2rem, 3.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }
  .problem-desc {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--ink-muted);
  }
  .problem-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  .p-stat {
    padding: 2rem;
    border-radius: 20px;
    background: white;
    border: 1px solid rgba(0,0,0,0.05);
    text-align: center;
    transition: all 0.3s;
  }
  .p-stat:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.06);
  }
  .p-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--teal);
    margin-bottom: 0.5rem;
  }
  .p-stat-label {
    font-size: 0.85rem;
    color: var(--ink-muted);
    line-height: 1.5;
  }

  /* ─── FEATURES ─── */
  .features {
    padding: 7rem 2rem;
    background: var(--teal-dark);
    position: relative;
    overflow: hidden;
  }
  .features::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 50%;
    height: 100%;
    background: radial-gradient(circle at top right, rgba(42,168,154,0.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .features-inner {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
  }
  .features .section-tag {
    color: var(--teal-light);
  }
  .features h2 {
    font-size: clamp(2rem, 3.5vw, 2.8rem);
    font-weight: 700;
    color: white;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
  }
  .features .section-desc {
    color: rgba(255,255,255,0.55);
    margin-bottom: 4rem;
  }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }
  .feature-card {
    padding: 2.25rem;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .feature-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-4px);
  }
  .fc-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: rgba(42,168,154,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .fc-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: white;
    margin-bottom: 0.75rem;
  }
  .fc-desc {
    font-size: 0.9rem;
    line-height: 1.65;
    color: rgba(255,255,255,0.5);
  }

  /* ─── HOW IT WORKS ─── */
  .how {
    padding: 7rem 2rem;
  }
  .how-inner {
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
  }
  .section-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 1.25rem;
  }
  .section-desc {
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--ink-muted);
    max-width: 520px;
    margin: 0 auto;
    margin-bottom: 4rem;
  }
  .steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    max-width: 960px;
    margin: 0 auto;
    position: relative;
  }
  .steps::before {
    content: '';
    position: absolute;
    top: 44px;
    left: 16%;
    right: 16%;
    height: 2px;
    background: linear-gradient(90deg, var(--teal-mist) 0%, var(--teal) 50%, var(--teal-mist) 100%);
  }
  .step {
    text-align: center;
    position: relative;
  }
  .step-num {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--teal);
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    position: relative;
    z-index: 1;
    box-shadow: 0 4px 20px rgba(26,122,110,0.25);
  }
  .step-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 0.6rem;
  }
  .step-desc {
    font-size: 0.9rem;
    color: var(--ink-muted);
    line-height: 1.6;
  }

  /* ─── PRICING ─── */
  .pricing {
    padding: 7rem 2rem;
    background: white;
    border-top: 1px solid rgba(0,0,0,0.04);
  }
  .pricing-inner {
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
  }
  .pricing h2 {
    font-size: clamp(2rem, 3.5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 4rem;
  }
  .price-card {
    padding: 2.5rem;
    border-radius: 24px;
    border: 1.5px solid rgba(0,0,0,0.06);
    background: var(--cream);
    text-align: left;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .price-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 50px rgba(0,0,0,0.08);
  }
  .price-card.featured {
    background: var(--teal-dark);
    border-color: transparent;
    color: white;
  }
  .price-card.featured .pc-price,
  .price-card.featured .pc-name,
  .price-card.featured .pc-item { color: white; }
  .price-card.featured .pc-desc { color: rgba(255,255,255,0.6); }
  .price-card.featured .pc-item::before { color: var(--teal-light); }
  .price-card.featured .pc-btn {
    background: white;
    color: var(--teal-dark);
  }
  .price-card.featured .pc-btn:hover {
    background: var(--teal-mist);
  }
  .pc-pop {
    position: absolute;
    top: -12px;
    right: 24px;
    background: var(--accent-gold);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.3rem 0.8rem;
    border-radius: 100px;
    letter-spacing: 0.05em;
  }
  .pc-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--ink);
  }
  .pc-desc {
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-bottom: 2rem;
  }
  .pc-price {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }
  .pc-price span { font-size: 1rem; font-weight: 500; opacity: 0.6; }
  .pc-period {
    font-size: 0.8rem;
    color: var(--ink-muted);
    margin-bottom: 2rem;
  }
  .price-card.featured .pc-period { color: rgba(255,255,255,0.5); }
  .pc-divider {
    height: 1px;
    background: rgba(0,0,0,0.06);
    margin-bottom: 1.5rem;
  }
  .price-card.featured .pc-divider { background: rgba(255,255,255,0.1); }
  .pc-list {
    list-style: none;
    margin-bottom: 2rem;
  }
  .pc-item {
    font-size: 0.88rem;
    color: var(--ink-light);
    padding: 0.5rem 0;
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .pc-item::before {
    content: '✓';
    color: var(--teal);
    font-weight: 700;
    flex-shrink: 0;
  }
  .pc-btn {
    display: block;
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.3s;
    background: var(--teal);
    color: white;
  }
  .pc-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(26,122,110,0.3);
  }
  .pc-btn.outline {
    background: transparent;
    border: 1.5px solid rgba(0,0,0,0.12);
    color: var(--ink);
  }
  .pc-btn.outline:hover {
    border-color: var(--teal);
    color: var(--teal);
    box-shadow: none;
  }

  /* ─── CTA SECTION ─── */
  .cta {
    padding: 7rem 2rem;
    text-align: center;
    position: relative;

// ═══ i18n ENGINE ═══
let currentLang = localStorage.getItem("veilo_lang") || (navigator.language||"tr").slice(0,2).toLowerCase();
if (!LANGS[currentLang]) currentLang = "tr";

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem("veilo_lang", lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = LANGS[lang]?.dir || "ltr";

  const dict = T[lang] || T.tr;

  // data-i18n → textContent
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key]) el.textContent = dict[key];
  });

  // data-i18n-html → innerHTML
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const key = el.getAttribute("data-i18n-html");
    if (dict[key]) el.innerHTML = dict[key];
  });

  // Update lang picker active state
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });

  // Update page title
  document.title = lang === "tr" ? "Veilo — Evinizin Dijital Kalkanı" :
    lang === "en" ? "Veilo — Your Home's Digital Shield" :
    lang === "de" ? "Veilo — Der digitale Schutzschild" :
    lang === "ar" ? "Veilo — الدرع الرقمي لمنزلك" :
    "Veilo — Le bouclier numérique de votre foyer";
}

function renderLangPicker() {
  const picker = document.getElementById("lang-picker");
  if (!picker) return;
  picker.innerHTML = Object.entries(LANGS).map(([k,v]) =>
    `<button class="lang-btn ${k===currentLang?'active':''}" data-lang="${k}" onclick="applyLang('${k}')" title="${v.name}">${v.flag}</button>`
  ).join("");
}

// ═══ Nav scroll ═══
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 40); });

// ═══ Scroll reveal ═══
const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.15 });
reveals.forEach(el => observer.observe(el));

// ═══ Smooth scroll ═══
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const target = document.querySelector(a.getAttribute('href'));
    if (target) { target.scrollIntoView({ behavior:'smooth', block:'start' }); document.querySelector('.nav-links')?.classList.remove('open'); }
  });
});

// ═══ INIT ═══
renderLangPicker();
applyLang(currentLang);
</script>
